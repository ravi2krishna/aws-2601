AWSTemplateFormatVersion: 2010-09-09 
Description: Cloud Formation Template For tcs VPC
Resources:
  tcsvpc: 
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: 'true'
      EnableDnsHostnames: 'true'
      Tags:
       - Key: Name
         Value: tcs

  tcswebSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref tcsvpc
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: "us-east-2a"
      MapPublicIpOnLaunch: 'true'
      Tags:
      - Key: Name
        Value: tcs-web-subnet

  tcsappSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref tcsvpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: "us-east-2a"
      MapPublicIpOnLaunch: 'true'
      Tags:
      - Key: Name
        Value: tcs-app-subnet

  tcsdbSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref tcsvpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: "us-east-2a"
      MapPublicIpOnLaunch: 'false'
      Tags:
      - Key: Name
        Value: tcs-db-subnet

  tcsInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: tcs-InternetGateway

  tcsAttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: tcsvpc
      InternetGatewayId:
        Ref: tcsInternetGateway

  tcspublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:  
        Ref: tcsvpc
      Tags:
      - Key: Name
        Value: tcs-public-rt

  tcswwwRoute:
    Type: AWS::EC2::Route
    DependsOn: tcsAttachGateway
    Properties:
       RouteTableId:
         Ref: tcspublicRouteTable
       DestinationCidrBlock: 0.0.0.0/0
       GatewayId:
         Ref: tcsInternetGateway

  tcswebSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: tcswebSubnet
      RouteTableId:
        Ref: tcspublicRouteTable

  tcsappSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: tcsappSubnet
      RouteTableId:
        Ref: tcspublicRouteTable

  tcsprivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:  
        Ref: tcsvpc
      Tags:
      - Key: Name
        Value: tcs-private-rt

  tcsdbSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: tcsdbSubnet
      RouteTableId:
        Ref: tcsprivateRouteTable

# For reference - NACL & Security Group

  crmPublicNetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId:
        Ref: crmVPC
      Tags:
        - Key: Name
          Value: crmPublicNetworkAcl
  
  crmPublicNetworkAclInboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
       NetworkAclId:
         Ref: crmPublicNetworkAcl
       RuleNumber: 100
       Protocol: 6
       RuleAction: allow
       CidrBlock: 0.0.0.0/0 
       PortRange:
         From: 0
         To: 65535

  crmPublicNetworkAclOutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
       NetworkAclId:
         Ref: crmPublicNetworkAcl
       RuleNumber: 100
       Protocol: -1
       Egress: true
       RuleAction: allow
       CidrBlock: 0.0.0.0/0
  
  crmPublicSubnetNetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: crmPublicSubnet
      NetworkAclId:
        Ref: crmPublicNetworkAcl
  
  crmPublicSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Public Traffic
      VpcId: !Ref crmVPC
      Tags:
        - Key: Name
          Value: crm-PublicSecurityGroup
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65355
          CidrIp: 0.0.0.0/0